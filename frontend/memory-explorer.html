<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmpAI Memory Explorer</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #1e1b4b 0%, #020617 60%);
      color: #e2e8f0;
      min-height: 100vh;
    }
    #root { min-height: 100vh; }
    .shell { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .card {
      width: 100%; max-width: 520px; border-radius: 14px;
      border: 1px solid rgba(148,163,184,.25); background: rgba(15,23,42,.88);
      box-shadow: 0 24px 60px rgba(0,0,0,.45); padding: 20px;
    }
    h1 { margin: 0 0 6px 0; }
    p { color: #94a3b8; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    a, button {
      border: 0; border-radius: 8px; padding: 10px 12px; text-decoration: none;
      color: #fff; background: #4f46e5; font-weight: 600; cursor: pointer;
    }
    .alt { background: #334155; }
    code { background:#0f172a; border-radius:6px; padding:2px 6px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React from 'https://esm.sh/react@18.3.1';
    import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';

    function Page() {
      const username = localStorage.getItem('ampai_username') || 'guest';
      const role = localStorage.getItem('ampai_role') || 'user';
      return React.createElement(
        'div',
        { className: 'shell' },
        React.createElement('div', { className: 'card' },
          React.createElement('h1', null, 'AmpAI Memory Explorer'),
          React.createElement('p', null, 'Memory Explorer entry page rendered with React.'),
          React.createElement('p', null, 'Current user: ', React.createElement('code', null, username), ' (', role, ')'),
          React.createElement('div', { className: 'row' },
            React.createElement('a', { href: '/index.html#/memory' }, 'Open SPA Route'),
            React.createElement('a', { className: 'alt', href: '/index.html' }, 'Open React Login')
          )
        )
      );
    }

    createRoot(document.getElementById('root')).render(React.createElement(Page));
  </script>
</body>
</html>
