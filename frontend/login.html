<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ampai Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px;">
        <form id="login-form" class="card" style="width: 100%; max-width: 420px;">
            <h1 style="margin-bottom: 8px;">Sign in</h1>
            <p style="color: var(--text-secondary); margin-bottom: 16px;">Use your Ampai account credentials.</p>
            <label>Username</label>
            <input id="username" class="modern-input" type="text" required style="margin-bottom: 12px;" />
            <label>Password</label>
            <input id="password" class="modern-input" type="password" required style="margin-bottom: 16px;" />
            <button type="submit" class="btn primary-btn">Login</button>
            <div id="login-error" style="margin-top: 12px; color: #ef4444;"></div>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('login-error');
            errorBox.textContent = '';

            const body = new URLSearchParams();
            body.set('username', username);
            body.set('password', password);

            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body,
            });

            if (!response.ok) {
                errorBox.textContent = 'Invalid username or password.';
                return;
            }

            const user = await response.json();
            window.location.href = user.role === 'admin' ? '/admin.html' : '/index.html';
        });
    </script>
</body>
</html>
