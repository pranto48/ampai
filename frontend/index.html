<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmpAI SPA (React)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { HashRouter, Routes, Route, Link, Navigate, useNavigate, useLocation } = ReactRouterDOM;
    const AuthContext = React.createContext(null);

    function useAuth() {
      const ctx = React.useContext(AuthContext);
      if (!ctx) throw new Error('useAuth must be used inside provider');
      return ctx;
    }

    async function apiFetch(path, options = {}) {
      const token = localStorage.getItem('ampai_token');
      const headers = { ...(options.headers || {}) };
      if (token) headers.Authorization = `Bearer ${token}`;
      return fetch(path, { ...options, headers });
    }

    function Layout({ children }) {
      const { user, logout } = useAuth();
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-950 via-indigo-950 to-slate-900">
          <header className="sticky top-0 z-20 border-b border-slate-800 bg-slate-900/80 backdrop-blur">
            <div className="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
              <div className="font-semibold tracking-wide">AmpAI React UI</div>
              <nav className="flex flex-wrap gap-2 text-sm">
                <Link className="rounded px-3 py-1 hover:bg-slate-800" to="/chat">Chat</Link>
                <Link className="rounded px-3 py-1 hover:bg-slate-800" to="/settings">Settings</Link>
                <Link className="rounded px-3 py-1 hover:bg-slate-800" to="/memory">Memory</Link>
                <Link className="rounded px-3 py-1 hover:bg-slate-800" to="/models">Models/API</Link>
                {user?.role === 'admin' && <Link className="rounded px-3 py-1 hover:bg-slate-800" to="/admin">Admin</Link>}
                <button className="rounded bg-slate-800 px-3 py-1 hover:bg-slate-700" onClick={logout}>Logout</button>
              </nav>
            </div>
          </header>
          <main className="mx-auto max-w-6xl p-4">{children}</main>
        </div>
      );
    }

    function LoginPage() {
      const { login, register } = useAuth();
      const [username, setUsername] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [error, setError] = React.useState('');

      const run = async (mode) => {
        setError('');
        try {
          if (mode === 'register') await register(username, password);
          await login(username, password);
        } catch (e) {
          setError(e.message || 'Authentication failed');
        }
      };

      return (
        <div className="mx-auto mt-10 max-w-md rounded-2xl border border-indigo-400/20 bg-slate-900/70 p-6 shadow-2xl backdrop-blur">
          <h1 className="mb-2 text-2xl font-bold">Welcome to AmpAI</h1>
          <p className="mb-6 text-sm text-slate-400">React + Router + Tailwind foundation with route guards and shared auth state.</p>
          <label className="mb-1 block text-sm">Username</label>
          <input value={username} onChange={(e) => setUsername(e.target.value)} className="mb-3 w-full rounded border border-slate-700 bg-slate-950 px-3 py-2" />
          <label className="mb-1 block text-sm">Password</label>
          <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="mb-4 w-full rounded border border-slate-700 bg-slate-950 px-3 py-2" />
          <div className="flex gap-2">
            <button onClick={() => run('login')} className="flex-1 rounded bg-indigo-600 px-3 py-2 font-medium hover:bg-indigo-500">Login</button>
            <button onClick={() => run('register')} className="flex-1 rounded bg-emerald-600 px-3 py-2 font-medium hover:bg-emerald-500">Register</button>
          </div>
          {error && <p className="mt-3 text-sm text-rose-400">{error}</p>}
        </div>
      );
    }

    function Page({ title, description, children }) {
      return (
        <div className="rounded-xl border border-slate-800 bg-slate-900/60 p-5 shadow-xl">
          <h2 className="text-xl font-semibold">{title}</h2>
          <p className="mt-1 text-sm text-slate-400">{description}</p>
          <div className="mt-4">{children}</div>
        </div>
      );
    }

    const ChatPage = () => <Page title="Chat" description="Future React chat workspace"><a className="rounded bg-indigo-600 px-3 py-2" href="/chat.html">Open current chat.html</a></Page>;
    const SettingsPage = () => <Page title="Settings" description="User preferences" />;
    const MemoryPage = () => <Page title="Memory" description="Search and browse memories"><a className="rounded bg-indigo-600 px-3 py-2" href="/memory-explorer.html">Open current memory page</a></Page>;
    const ModelsPage = () => <Page title="AI Model/API Connection" description="Provider keys and defaults" />;
    const AdminPage = () => <Page title="Admin" description="Admin-only tools"><a className="rounded bg-indigo-600 px-3 py-2" href="/admin.html">Open current admin page</a></Page>;

    function ProtectedRoute({ children, roles }) {
      const { user, ready } = useAuth();
      const location = useLocation();
      if (!ready) return <div className="p-6 text-slate-400">Loading...</div>;
      if (!user) return <Navigate to="/login" replace state={{ from: location.pathname }} />;
      if (roles && !roles.includes(user.role)) return <Navigate to="/chat" replace />;
      return children;
    }

    function AuthProvider({ children }) {
      const [user, setUser] = React.useState(null);
      const [ready, setReady] = React.useState(false);
      const navigate = useNavigate();

      React.useEffect(() => {
        (async () => {
          try {
            const res = await apiFetch('/api/auth/whoami');
            if (res.ok) setUser(await res.json());
          } finally {
            setReady(true);
          }
        })();
      }, []);

      const login = async (username, password) => {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const raw = await res.text();
        let data = {};
        try { data = JSON.parse(raw); } catch { data = { detail: raw }; }
        if (!res.ok) throw new Error(data.detail || 'Login failed');
        localStorage.setItem('ampai_token', data.token || '');
        localStorage.setItem('ampai_role', data.role || 'user');
        localStorage.setItem('ampai_username', data.username || username);
        setUser({ username: data.username || username, role: data.role || 'user' });
        navigate('/chat', { replace: true });
      };

      const register = async (username, password) => {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const raw = await res.text();
        let data = {};
        try { data = JSON.parse(raw); } catch { data = { detail: raw }; }
        if (!res.ok) throw new Error(data.detail || 'Registration failed');
      };

      const logout = async () => {
        await fetch('/api/auth/logout', { method: 'POST' });
        localStorage.removeItem('ampai_token');
        localStorage.removeItem('ampai_role');
        localStorage.removeItem('ampai_username');
        setUser(null);
        navigate('/login', { replace: true });
      };

      return <AuthContext.Provider value={{ user, ready, login, register, logout }}>{children}</AuthContext.Provider>;
    }

    function App() {
      return (
        <HashRouter>
          <AuthProvider>
            <Routes>
              <Route path="/login" element={<LoginPage />} />
              <Route path="/" element={<Navigate to="/chat" replace />} />
              <Route path="/chat" element={<ProtectedRoute><Layout><ChatPage /></Layout></ProtectedRoute>} />
              <Route path="/settings" element={<ProtectedRoute><Layout><SettingsPage /></Layout></ProtectedRoute>} />
              <Route path="/memory" element={<ProtectedRoute><Layout><MemoryPage /></Layout></ProtectedRoute>} />
              <Route path="/models" element={<ProtectedRoute><Layout><ModelsPage /></Layout></ProtectedRoute>} />
              <Route path="/admin" element={<ProtectedRoute roles={['admin']}><Layout><AdminPage /></Layout></ProtectedRoute>} />
              <Route path="*" element={<Navigate to="/chat" replace />} />
            </Routes>
          </AuthProvider>
        </HashRouter>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
