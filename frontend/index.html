<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmpAI Login</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #1e1b4b 0%, #020617 55%);
      color: #e2e8f0;
      min-height: 100vh;
    }
    .shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }
    h1 { margin: 0 0 8px 0; font-size: 1.35rem; }
    p { margin: 0 0 14px 0; color: #94a3b8; }
    label { display: block; font-size: .9rem; margin: 10px 0 6px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #020617;
      color: #f8fafc;
    }
    .row { display: flex; gap: 10px; margin-top: 14px; }
    button {
      flex: 1;
      padding: 10px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #4f46e5; }
    .btn-secondary { background: #059669; }
    .btn-ghost { background: #334155; }
    .error { margin-top: 12px; color: #fda4af; }
    .ok { margin-top: 12px; color: #86efac; }
    code { background: #0f172a; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useMemo, useState } from 'https://esm.sh/react@18.3.1';
    import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';

    function App() {
      const [username, setUsername] = useState(localStorage.getItem('ampai_username') || '');
      const [password, setPassword] = useState('');
      const [busy, setBusy] = useState(false);
      const [error, setError] = useState('');
      const [ok, setOk] = useState('');

      const token = localStorage.getItem('ampai_token') || '';
      const role = localStorage.getItem('ampai_role') || 'user';
      const loggedIn = !!token;

      const statusText = useMemo(() => {
        if (!loggedIn) return 'Not logged in';
        return `Logged in as ${username || 'user'} (${role})`;
      }, [loggedIn, username, role]);

      async function callAuth(path, body) {
        const res = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const raw = await res.text();
        let data = {};
        try { data = JSON.parse(raw); } catch { data = { detail: raw }; }
        if (!res.ok) {
          throw new Error(data.detail || `Request failed (${res.status})`);
        }
        return data;
      }

      async function onLogin() {
        setBusy(true); setError(''); setOk('');
        try {
          const data = await callAuth('/api/auth/login', { username: username.trim(), password });
          localStorage.setItem('ampai_token', data.token || '');
          localStorage.setItem('ampai_role', data.role || 'user');
          localStorage.setItem('ampai_username', data.username || username.trim());
          setOk('Login successful.');
          setPassword('');
          window.location.hash = '#/chat';
        } catch (e) {
          setError(e.message || 'Login failed');
        } finally {
          setBusy(false);
        }
      }

      async function onRegister() {
        setBusy(true); setError(''); setOk('');
        try {
          await callAuth('/api/auth/register', { username: username.trim(), password });
          setOk('Registration successful. You can log in now.');
        } catch (e) {
          setError(e.message || 'Registration failed');
        } finally {
          setBusy(false);
        }
      }

      function onLogout() {
        localStorage.removeItem('ampai_token');
        localStorage.removeItem('ampai_role');
        localStorage.removeItem('ampai_username');
        setOk('Logged out.');
        setError('');
        window.location.hash = '#/login';
      }

      return React.createElement(
        'div',
        { className: 'shell' },
        React.createElement(
          'div',
          { className: 'card' },
          React.createElement('h1', null, 'AmpAI React Login'),
          React.createElement('p', null, statusText),
          React.createElement('label', null, 'Username'),
          React.createElement('input', {
            value: username,
            onChange: (e) => setUsername(e.target.value),
            autoComplete: 'username',
          }),
          React.createElement('label', null, 'Password'),
          React.createElement('input', {
            type: 'password',
            value: password,
            onChange: (e) => setPassword(e.target.value),
            autoComplete: loggedIn ? 'off' : 'current-password',
          }),
          React.createElement(
            'div',
            { className: 'row' },
            React.createElement('button', {
              className: 'btn-primary',
              onClick: onLogin,
              disabled: busy,
              type: 'button',
            }, busy ? 'Working...' : 'Login'),
            React.createElement('button', {
              className: 'btn-secondary',
              onClick: onRegister,
              disabled: busy,
              type: 'button',
            }, busy ? 'Working...' : 'Register')
          ),
          loggedIn && React.createElement(
            'div',
            { className: 'row' },
            React.createElement('button', {
              className: 'btn-ghost',
              onClick: onLogout,
              type: 'button',
            }, 'Logout')
          ),
          error && React.createElement('div', { className: 'error' }, error),
          ok && React.createElement('div', { className: 'ok' }, ok),
          React.createElement('p', { style: { marginTop: '16px' } },
            'Default admin: ',
            React.createElement('code', null, 'admin'),
            ' / ',
            React.createElement('code', null, 'P@ssw0rd')
          )
        )
      );
    }

    createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
