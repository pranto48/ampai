<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmpAI | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px;">
        <form id="login-form" class="card" style="width: 100%; max-width: 460px;">
            <h1 style="margin-bottom: 8px;">Welcome to AmpAI</h1>
            <p style="color: var(--text-secondary); margin-bottom: 16px;">Login to continue to chat, settings, memory explorer, and AI model/API connections.</p>

            <label>Username</label>
            <input id="username" class="modern-input" type="text" required style="margin-bottom: 12px;" />
            <label>Password</label>
            <input id="password" class="modern-input" type="password" required style="margin-bottom: 16px;" />

            <div style="display:flex; gap:10px;">
                <button type="submit" class="btn primary-btn" style="width:100%;">Login</button>
                <button type="button" id="register-btn" class="btn" style="width:100%;">Register</button>
            </div>

            <div id="login-error" style="margin-top: 12px; color: #ef4444;"></div>

            <div style="margin-top: 16px; display:flex; gap:8px; flex-wrap:wrap;">
                <a href="chat.html" class="btn" style="width:auto;">Chat Page</a>
                <a href="settings.html" class="btn" style="width:auto;">Settings Page</a>
                <a href="memory-explorer.html" class="btn" style="width:auto;">Memory Page</a>
                <a href="ai-models.html" class="btn" style="width:auto;">AI Model/API Page</a>
            </div>
        </form>
    </div>

    <script>
        async function doAuth(mode) {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('login-error');
            errorBox.textContent = '';

            if (!username || !password) {
                errorBox.textContent = 'Username and password are required.';
                return;
            }

            try {
                if (mode === 'register') {
                    const reg = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    if (!reg.ok) {
                        const err = await reg.json();
                        throw new Error(err.detail || 'Registration failed');
                    }
                }

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Invalid username or password.');
                }

                const user = await response.json();
                localStorage.setItem('ampai_token', user.token || '');
                localStorage.setItem('ampai_role', user.role || 'user');
                localStorage.setItem('ampai_username', user.username || username);
                window.location.href = '/chat.html';
            } catch (error) {
                errorBox.textContent = error.message || 'Login failed.';
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            await doAuth('login');
        });

        document.getElementById('register-btn').addEventListener('click', async () => {
            await doAuth('register');
        });
    </script>
</body>
</html>
