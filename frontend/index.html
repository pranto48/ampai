<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmpAI | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-page-shell">
        <div class="login-glow login-glow-a"></div>
        <div class="login-glow login-glow-b"></div>
        <form id="login-form" class="card login-card" style="width: 100%; max-width: 460px;">
            <h1 style="margin-bottom: 8px;">Welcome to AmpAI ✨</h1>
            <p id="login-subtitle" style="color: var(--text-secondary); margin-bottom: 16px;">Login to continue to chat, settings, memory explorer, and AI model/API connections.</p>

            <label>Username</label>
            <input id="username" class="modern-input" type="text" required style="margin-bottom: 12px;" />
            <label>Password</label>
            <div style="position:relative; margin-bottom: 16px;">
                <input id="password" class="modern-input" type="password" required style="padding-right: 80px;" />
                <button type="button" id="toggle-password-btn" class="btn" style="position:absolute; right:6px; top:6px; width:auto; padding:4px 8px; font-size:0.75rem;">Show</button>
            </div>

            <div class="login-actions" style="display:flex; gap:10px;">
                <button type="submit" class="btn primary-btn" style="width:100%;">Login</button>
                <button type="button" id="register-btn" class="btn" style="width:100%;">Register</button>
            </div>

            <div id="login-error" style="margin-top: 12px; color: #ef4444;"></div>

            <div class="quick-nav-links" style="margin-top: 16px; display:flex; gap:8px; flex-wrap:wrap;">
                <a href="chat.html" class="btn" style="width:auto;">Chat Page</a>
                <a href="settings.html" class="btn" style="width:auto;">Settings Page</a>
                <a href="memory-explorer.html" class="btn" style="width:auto;">Memory Page</a>
                <a href="ai-models.html" class="btn" style="width:auto;">AI Model/API Page</a>
                <a href="spa.html#/login" class="btn" style="width:auto;">React SPA Preview</a>
            </div>
        </form>
    </div>

    <script>
        async function doAuth(mode) {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('login-error');
            errorBox.textContent = '';

            if (!username || !password) {
                errorBox.textContent = 'Username and password are required.';
                return;
            }

            try {
                if (mode === 'register') {
                    const reg = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    if (!reg.ok) {
                        const errText = await reg.text();
                        let detail = 'Registration failed';
                        try {
                            const parsed = JSON.parse(errText);
                            detail = parsed.detail || detail;
                        } catch (_) {
                            detail = errText || detail;
                        }
                        throw new Error(detail);
                    }
                }

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    let detail = 'Invalid username or password.';
                    try {
                        const parsed = JSON.parse(errText);
                        detail = parsed.detail || detail;
                    } catch (_) {
                        if (errText) detail = errText;
                    }
                    throw new Error(detail);
                }

                const user = await response.json();
                localStorage.setItem('ampai_token', user.token || '');
                localStorage.setItem('ampai_role', user.role || 'user');
                localStorage.setItem('ampai_username', user.username || username);
                window.location.href = '/chat.html';
            } catch (error) {
                errorBox.textContent = error.message || 'Login failed.';
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            await doAuth('login');
        });

        document.getElementById('register-btn').addEventListener('click', async () => {
            await doAuth('register');
        });

        const toggleBtn = document.getElementById('toggle-password-btn');
        const passwordInput = document.getElementById('password');
        if (toggleBtn && passwordInput) {
            toggleBtn.addEventListener('click', () => {
                const show = passwordInput.type === 'password';
                passwordInput.type = show ? 'text' : 'password';
                toggleBtn.textContent = show ? 'Hide' : 'Show';
            });
        }

        const subtitle = document.getElementById('login-subtitle');
        const words = [
            'Secure login for Chat, Settings, Memory, and AI connections.',
            'Build, remember, and collaborate with AmpAI.',
            'One account. Multi-page workspace. Smooth flow.'
        ];
        let idx = 0;
        setInterval(() => {
            if (!subtitle) return;
            idx = (idx + 1) % words.length;
            subtitle.textContent = words[idx];
        }, 3000);
    </script>
</body>
</html>
