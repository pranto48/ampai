<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent | Infinite Memory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="user-menu-container">
            <span id="auth-user" class="badge"></span>
            <span id="auth-role" class="badge"></span>
            <button class="btn user-menu-trigger" type="button" data-user-menu-btn>Menu ▾</button>
            <div class="user-menu-panel" data-user-menu-panel>
                <a href="admin.html" class="user-menu-item">Admin Panel</a>
                <button class="user-menu-item" data-logout-btn type="button">Logout</button>
            </div>
        </div>
        <!-- Update Banner -->
        <div id="update-banner" class="update-banner" style="display: none;">
            <span>Ampai update available! A file has been changed.</span>
            <button id="sync-code-btn" class="btn primary-btn small-btn">Sync Code</button>
        </div>

        <!-- Sync Modal -->
        <div id="sync-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
            <div style="background: var(--bg-secondary); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                <h3 style="margin-top: 0; display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                    <div style="width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                    Syncing Architecture
                </h3>
                <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.4;">The backend is restarting. Please wait while the system safely recovers.</p>
                <div id="sync-logs" style="background: #0f172a; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.8rem; color: #10b981; height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px;">
                </div>
            </div>
        </div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>AI Agent</h2>
                <span class="badge">Memory Active</span>
            </div>
            
            <button id="new-chat-btn" class="btn primary-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Session
            </button>
            
            <div class="settings-section">
                <label for="model-select">Model Provider</label>
                <select id="model-select" class="modern-input">
                    <option value="ollama">Ollama (Local - Gemma)</option>
                    <option value="generic">Generic Local (LM Studio)</option>
                    <option value="openai">OpenAI (GPT-4/3.5)</option>
                    <option value="gemini">Google Gemini</option>
                    <option value="anthropic">Anthropic Claude</option>
                    <option value="openrouter">OpenRouter (Free Models)</option>
                    <option value="anythingllm">AnythingLLM Workspace</option>
                </select>
                
                <label for="api-key" id="api-key-label" style="display:none;">API Key</label>
                <input type="password" id="api-key" class="modern-input" placeholder="Enter API Key" style="display:none;">
            </div>

            <div class="sessions-container">
                <h3>Memories</h3>
                <input id="session-search" class="modern-input" placeholder="Search sessions..." style="margin-bottom: 8px;" />
                <label style="display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-secondary);">
                    <input type="checkbox" id="show-archived-toggle">
                    Show archived only
                </label>
                <ul id="sessions-list">
                    <!-- Sessions will be loaded here -->
                </ul>
            </div>

            <div class="sessions-container" style="margin-top: 16px;">
                <h3>Tasks</h3>
                <button id="tasks-view-btn" class="btn" style="margin-bottom: 8px;">Open Tasks</button>
                <div id="task-quick-add" style="display: flex; gap: 6px;">
                    <input id="task-quick-add-input" class="modern-input" placeholder="Quick add task from chat..." style="font-size: 0.8rem; padding: 8px;" />
                    <button id="task-quick-add-btn" class="btn icon-btn" title="Add Task">+</button>
                </div>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <div class="header-info" style="display: flex; justify-content: space-between; align-items: center; width: 100%; flex-wrap: wrap; gap: 10px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <button id="mobile-menu-btn" class="btn icon-btn" style="display: none; padding: 0;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                        </button>
                        <div>
                            <h1 id="current-session-title">New Session</h1>
                            <span id="current-session-id" class="session-id-display"></span>
                        </div>
                    </div>
                    <div class="header-controls" style="display: flex; align-items: center; flex-wrap: wrap; gap: 10px;">
                        <div class="memory-mode-toggle" style="display: flex; align-items: center; gap: 8px;">
                            <span style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase;">Memory</span>
                            <select id="memory-mode" class="modern-input" style="padding: 6px 10px; width: 110px; font-size: 0.8rem; background-color: rgba(255,255,255,0.05); border-color: rgba(16, 185, 129, 0.4);">
                                <option value="full">Full History</option>
                                <option value="indexed">Fast Indexed</option>
                            </select>
                        </div>
                        <div class="category-selector">
                            <select id="session-category" class="modern-input" style="padding: 6px 10px; width: 110px; font-size: 0.8rem; background-color: rgba(255,255,255,0.05);">
                                <option value="Uncategorized">Uncategorized</option>
                                <option value="Work">Work</option>
                                <option value="Personal">Personal</option>
                                <option value="Ideas">Ideas</option>
                                <option value="Code">Code</option>
                            </select>
                        </div>
                        <button id="delete-session-btn" class="btn icon-btn" title="Delete Session" style="background-color: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); padding: 6px;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                        <button id="summarize-email-btn" class="btn" title="Summarize today's inbox" style="width:auto; padding:6px 10px; border:1px solid rgba(16,185,129,0.4); background:rgba(16,185,129,0.15); color:#10b981;">
                            Summarize Today’s Email
                        </button>
                    </div>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="message ai-message welcome-message">
                    <div class="avatar">AI</div>
                    <div class="bubble">
                        <p>Hello! I am your AI agent with persistent memory. How can I help you today?</p>
                    </div>
                </div>
                <!-- Chat messages will be appended here -->
            </div>

            <div class="chat-input-container">
                <div id="attachment-preview" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;"></div>
                <form id="chat-form">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
                        <label class="toggle-switch" style="display: flex; align-items: center; cursor: pointer; font-size: 0.8rem; color: var(--text-secondary);">
                            <input type="checkbox" id="web-search-toggle" style="margin-right: 6px;">
                            <span style="font-weight: 500;">🌐 Web Search</span>
                        </label>
                    </div>
                    <div class="input-wrapper" style="display: flex; align-items: flex-end; gap: 8px;">
                        <input type="file" id="file-input" style="display: none;" multiple accept=".pdf,.txt,.csv,.json,.md,.png,.jpg,.jpeg">
                        <button type="button" id="attach-btn" class="btn icon-btn" title="Attach File" style="background: transparent; border: none; padding: 8px; color: var(--text-secondary);">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </button>
                        <textarea id="message-input" placeholder="Message your AI..." rows="1" autofocus style="flex: 1;"></textarea>
                        <button type="submit" id="send-btn" class="btn icon-btn" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
