services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agent_postgres
    restart: always
    environment:
      - POSTGRES_USER=ampai
      - POSTGRES_PASSWORD=ampai
      - POSTGRES_DB=ampai
    volumes:
      - ./agent_data/pgdata:/var/lib/postgresql/data
    # Use env-overridable host port to avoid conflicts (e.g. local Postgres on 5432)
    ports:
      - "${DB_HOST_PORT:-5433}:5432"

  redis:
    image: redis:alpine
    container_name: agent_redis
    restart: always
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - ./agent_data/redisdata:/data

  agent-web-app:
    build: .
    container_name: ai_agent_web
    depends_on:
      - db
      - redis
    ports:
      - "${APP_HOST_PORT:-8001}:8000"
    volumes:
      - ./agent_data:/app/data
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    environment:
      - DATABASE_URL=postgresql://ampai:ampai@db:5432/ampai
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
