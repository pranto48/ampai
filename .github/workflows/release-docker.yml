name: release-docker

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive semantic version
        id: semver
        run: |
          RAW="${GITHUB_REF_NAME}"
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/ampai
          VERSION: ${{ steps.semver.outputs.version }}
        run: |
          docker build -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"

      - name: Prepare docker release bundle
        run: |
          mkdir -p dist/docker
          cp docker-compose.yml dist/docker/docker-compose.yml
          cat > dist/docker/RELEASE_NOTES.md <<'NOTES'
          # AmpAI Docker Release

          - Image: ghcr.io/${{ github.repository_owner }}/ampai:${{ steps.semver.outputs.version }}
          - Also published: latest
          - Compose file: docker-compose.yml
          NOTES

      - name: Upload docker bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ampai-docker-release
          path: dist/docker/*

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/docker/docker-compose.yml
            dist/docker/RELEASE_NOTES.md
